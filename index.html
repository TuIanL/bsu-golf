<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>高尔夫挥杆实时识别 MVP</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script>
    window.onerror = function(msg, url, line, col, error) {
        alert("🚨 前端JS运行报错!\n\n错误信息: " + msg + "\n文件位置: " + url + " (第 " + line + " 行)");
    };
    window.addEventListener('unhandledrejection', function(event) {
        alert("🚨 异步Promise报错!\n\n原因: " + (event.reason?.message || event.reason));
    });

    // 🔬 控制台报错捕获并投射到屏幕上
    (function() {
        document.addEventListener("DOMContentLoaded", () => {
            const div = document.createElement("div");
            div.id = "screenConsole";
            div.style = "position:fixed; bottom:0; left:0; width:100%; height:200px; background:rgba(0,0,0,0.9); color:#ff5555; font-family:monospace; font-size:12px; z-index:100000; overflow-y:auto; padding:10px; border-top:2px solid #ff4444; display:none;";
            document.body.appendChild(div);

            const appendLog = (msg, color) => {
                div.style.display = "block";
                const p = document.createElement("div");
                p.style.color = color;
                p.style.marginBottom = "5px";
                p.innerText = msg;
                div.appendChild(p);
                div.scrollTop = div.scrollHeight;
            };

            const oldErr = console.error;
            console.error = function() {
                appendLog("❌ [Error] " + Array.from(arguments).join(" "), "#ff5555");
                oldErr.apply(console, arguments);
            };
            const oldWarn = console.warn;
            console.warn = function() {
                appendLog("⚠️ [Warn] " + Array.from(arguments).join(" "), "#ffaa00");
                oldWarn.apply(console, arguments);
            };
        });
    })();
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
        "react/jsx-dev-runtime": "https://esm.sh/react@18/jsx-dev-runtime",
        "three": "https://esm.sh/three@0.160",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8?external=react,react-dom,three"
      }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>高尔夫挥杆实时识别 MVP</h1>
        <div class="controls">
          <label>
            球杆
            <select id="clubSelect">
              <option value="wood">木杆</option>
              <option value="iron">铁杆</option>
              <option value="wedge">挖起杆</option>
            </select>
          </label>
          <label>
            视角
            <select id="viewSelect">
              <option value="front">正面</option>
              <option value="side">侧面</option>
            </select>
          </label>
          <label>
            持杆手
            <select id="handednessSelect">
              <option value="right">右手</option>
              <option value="left">左手</option>
            </select>
          </label>
          <button id="startBtn">开始检测</button>
          <button id="stopBtn" disabled>停止</button>
        </div>
      </header>

      <!-- 模式切换 Tab -->
      <div class="modeTabs">
        <button class="modeTab active" id="tabCamera">📷 实时摄像头</button>
        <button class="modeTab" id="tabUpload">📁 上传视频</button>
        <button class="modeTab" id="tabDashboard">📊 赛博全景大屏</button>
      </div>

      <main class="layout">
        <section class="cameraPanel">
          <div class="videoWrap">
            <video id="video" playsinline muted></video>
            <canvas id="overlay"></canvas>
          </div>
          <div class="status">
            <span id="cameraStatus">摄像头未启动</span>
            <span id="latencyStatus">延迟: -</span>
            <span id="recordStatus" class="cameraOnly">自动录制: 待机</span>
          </div>

          <!-- 上传视频专属控件（默认隐藏） -->
          <div class="uploadPanel" id="uploadPanel">
            <label class="dropZone" id="dropZone">
              <input type="file" id="videoFileInput" accept="video/*" hidden />
              <span class="dropIcon">🎬</span>
              <span class="dropText">点击或拖拽视频文件到此处</span>
              <span class="dropSub">支持 MP4 / WebM / MOV 格式</span>
            </label>
            <div class="progressRow" id="progressRow" style="display:none">
              <span id="analysisStatusText">分析中...</span>
              <div class="progressBarWrap">
                <div class="progressBarFill" id="progressBarFill"></div>
              </div>
              <span id="progressTimeText">0:00 / 0:00</span>
            </div>
          </div>
        </section>

        <section class="resultPanel">
          <div class="scoreCard">
            <h2>实时评分</h2>
            <p class="score"><span id="scoreValue">--</span>/100</p>
            <ul id="deductionList"></ul>
          </div>

          <div class="metricsGrid" id="metricsGrid"></div>

          <div class="issuesCard">
            <h3>问题识别（Top10）</h3>
            <ul id="issueList"></ul>
          </div>
        </section>
      </main>

      <section class="bottom">
        <div class="chartCard">
          <h3>轨迹与重心可视化</h3>
          <canvas id="trajectoryCanvas" width="720" height="220"></canvas>
        </div>
        <div class="explainCard">
          <h3>图文 + 视频解释</h3>
          <div id="explanation"></div>
        </div>
      </section>
    </div>

    <!-- 赛博大屏挂载点 (React) -->
    <div id="dashboardApp" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#080c15; overflow:hidden;">
        <div style="color: #ff0000; font-size: 24px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; text-shadow: 0 0 10px #ff0000;">
            ⚠️ 正在加载 React 核心组件... (原生 DOM 节点已激活)
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module">
        (async () => {
             console.log("尝试动态加载赛博大屏模块...");
             try {
                 // 🌟 强行追加入随机参数，绕过浏览器本地 `.js` 文件的顽固缓存
                 await import("./src/dashboard/DashboardApp.js?v=" + Date.now());
                 console.log("赛博大屏模块加载成功!");
             } catch (err) {
                 console.error("模块载入崩溃:", err);
                 alert("🚨 赛博大屏模组载入崩溃!\n\n可能原因: " + err.message);
             }
        })();
    </script>
  </body>
</html>
